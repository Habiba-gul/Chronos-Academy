<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronos Academy: The Scholar's Odyssey</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM CDN (React 18) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel CDN for In-Browser JSX Parsing -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts Connection -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    .font-cinzel { font-family: 'Cinzel', serif; }
    .font-cinzel-dec { font-family: 'Cinzel Decorative', serif; }
    .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Custom high-performance CSS animations */
    @keyframes float-slow {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(0.5deg); }
    }
    
    @keyframes pulse-gold-glow {
      0%, 100% { 
        border-color: rgba(212, 175, 55, 0.2); 
        box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(212, 175, 55, 0.05); 
      }
      50% { 
        border-color: rgba(212, 175, 55, 0.55); 
        box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2), inset 0 0 25px rgba(212, 175, 55, 0.15); 
      }
    }

    @keyframes fade-slide-up {
      0% { opacity: 0; transform: translateY(30px); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes astrolabe-spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .animate-page-entry {
      animation: fade-slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-float { animation: float-slow 6s ease-in-out infinite; }
    .animate-spin-astrolabe { animation: astrolabe-spin-cw 40s linear infinite; }
    .glow-gold-card { animation: pulse-gold-glow 6s ease-in-out infinite; }

    /* Glassmorphism utility classes */
    .glass-panel {
      background: rgba(10, 15, 28, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glass-input {
      background: rgba(3, 5, 10, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.25);
      outline: none;
    }

    .checkbox-pop {
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .checkbox-pop:active {
      transform: scale(0.85);
    }

    /* Custom scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #030508; }
    ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }
  </style>
</head>
<body class="bg-[#020408] text-slate-100 font-jakarta selection:bg-amber-500/30 selection:text-amber-300 relative overflow-x-hidden min-h-screen">

  <!-- Background Canvas for Atmospheric Snow, Stars and Mist -->
  <canvas id="cinematic-canvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

  <div id="root" class="relative z-10"></div>

  <!-- React Code Implementation -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const DEFAULT_SUBJECTS = [
      { id: '1', name: 'Data Structures', priority: 'High', creditHours: 4 },
      { id: '2', name: 'Calculus', priority: 'Medium', creditHours: 3 },
      { id: '3', name: 'Programming Fundamentals', priority: 'Low', creditHours: 3 }
    ];

    const MOTIVATIONAL_QUOTES = [
      "The sword of wisdom is forged in the fire of daily study.",
      "An hour of deep, focused study is better than an entire day of distractions.",
      "A scholar is a warrior whose battlefield is the scroll, and whose shield is focus.",
      "The stars guide those who seek truth with unwavering dedication.",
      "Every step in the schedule is a step toward conquering your academic destiny."
    ];

    const CONGRATS_MESSAGES = [
      "Incredible victory, Scholar! Today's timeline is successfully secured. Rest well, for tomorrow we weave a new chronicle!",
      "You have conquered your study tasks with unmatched discipline. The Chronos Academy is proud of your effort!",
      "Outstanding resolve! The knowledge you acquired today is a permanent addition to your arsenal.",
      "A flawless study day! Rest now, and prepare yourself for tomorrow's challenges."
    ];

    // Native Web Audio API Sound Synthesizer (No external file dependencies)
    const playChimeSound = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const notes = [523.25, 659.25, 783.99, 987.77, 1174.66]; // C5, E5, G5, B5, D6
        notes.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const gainNode = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, ctx.currentTime + (idx * 0.05));
          gainNode.gain.setValueAtTime(0.08, ctx.currentTime + (idx * 0.05));
          gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.0 + (idx * 0.05));
          
          osc.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          osc.start(ctx.currentTime + (idx * 0.05));
          osc.stop(ctx.currentTime + 1.4 + (idx * 0.05));
        });
      } catch (e) {}
    };

    const playCongratulationsFanfare = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, idx) => {
          const osc = ctx.createOscillator();
          const gainNode = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime + (idx * 0.04));
          gainNode.gain.setValueAtTime(0.05, ctx.currentTime + (idx * 0.04));
          gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2.0);
          
          osc.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          osc.start(ctx.currentTime + (idx * 0.04));
          osc.stop(ctx.currentTime + 2.2);
        });
      } catch (e) {}
    };

    // React Typewriter dialogue engine
    function Typewriter({ text, delay = 20 }) {
      const [output, setOutput] = useState("");
      useEffect(() => {
        setOutput("");
        let idx = 0;
        const interval = setInterval(() => {
          setOutput((prev) => prev + text.charAt(idx));
          idx++;
          if (idx >= text.length) clearInterval(interval);
        }, delay);
        return () => clearInterval(interval);
      }, [text]);

      return <span className="font-lora italic">{output}</span>;
    }

    function ChronosAcademy() {
      const [currentPage, setCurrentPage] = useState('welcome');
      const [transitionKey, setTransitionKey] = useState(0);
      const [currentDay, setCurrentDay] = useState(1);
      
      // Dynamic Course Selection State
      const [selectedSubjects, setSelectedSubjects] = useState(DEFAULT_SUBJECTS);
      const [courseInput, setCourseInput] = useState({ name: '', priority: 'High', creditHours: 3 });
      
      const [completedTasks, setCompletedTasks] = useState([]);
      const [particles, setParticles] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [randomQuote, setRandomQuote] = useState(MOTIVATIONAL_QUOTES[0]);

      // Image Path State Fallbacks (Solves React rendering/overwriting issue)
      const [logoImgSrc, setLogoImgSrc] = useState("789.jpg");
      const [guardianImgSrc, setSentinelImgSrc] = useState("123.jpg");
      const [mascotImgSrc, setMascotImgSrc] = useState("111.jpg");

      // Authentication States
      const [authMode, setAuthMode] = useState('login');
      const [authForm, setAuthForm] = useState({ fullName: '', username: '', password: '', confirmPassword: '' });
      const [registeredUser, setRegisteredUser] = useState(null);
      const [authError, setAuthError] = useState('');

      // Daily scheduler hours and structured calendar state
      const [weeklyCapacity, setWeeklyCapacity] = useState(20);
      const [weeklySchedule, setWeeklySchedule] = useState([]);

      // Cinematic Canvas Initialization: Falling Snow, stars, subtle floating clouds
      useEffect(() => {
        const canvas = document.getElementById('cinematic-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let frameId;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resize);
        resize();

        // Canvas particle assets
        const snowflakes = Array.from({ length: 60 }).map(() => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 1,
          density: Math.random() * 0.5 + 0.2,
          wind: (Math.random() - 0.5) * 0.2
        }));

        const stars = Array.from({ length: 35 }).map(() => ({
          x: Math.random() * canvas.width,
          y: Math.random() * (canvas.height * 0.7),
          radius: Math.random() * 1.2 + 0.3,
          pulseSpeed: Math.random() * 0.02 + 0.005,
          alpha: Math.random()
        }));

        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // Draw sky ambient background gradient
          const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
          skyGrad.addColorStop(0, '#03050a');
          skyGrad.addColorStop(0.5, '#050a17');
          skyGrad.addColorStop(1, '#020408');
          ctx.fillStyle = skyGrad;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Draw subtle mountain silhouettes at bottom
          ctx.fillStyle = '#010306';
          ctx.beginPath();
          ctx.moveTo(0, canvas.height);
          ctx.lineTo(0, canvas.height - 180);
          ctx.quadraticCurveTo(canvas.width * 0.25, canvas.height - 240, canvas.width * 0.5, canvas.height - 160);
          ctx.quadraticCurveTo(canvas.width * 0.75, canvas.height - 120, canvas.width, canvas.height - 200);
          ctx.lineTo(canvas.width, canvas.height);
          ctx.closePath();
          ctx.fill();

          // Draw glowing celestial stars
          stars.forEach(s => {
            s.alpha += s.pulseSpeed;
            if (s.alpha > 1 || s.alpha < 0.2) s.pulseSpeed = -s.pulseSpeed;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(212, 175, 55, ${s.alpha})`;
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#d4af37';
            ctx.fill();
          });
          ctx.shadowBlur = 0; // reset shadow

          // Draw falling snow particles
          snowflakes.forEach(f => {
            f.y += f.density * 1.5;
            f.x += f.wind;
            if (f.y > canvas.height) {
              f.y = -10;
              f.x = Math.random() * canvas.width;
            }
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.fill();
          });

          frameId = requestAnimationFrame(animate);
        };
        animate();

        return () => {
          window.removeEventListener('resize', resize);
          cancelAnimationFrame(frameId);
        };
      }, []);

      // Load registered user credentials from Local Storage on mount
      useEffect(() => {
        const stored = localStorage.getItem('chronos_user_reg');
        if (stored) {
          try {
            setRegisteredUser(JSON.parse(stored));
          } catch(e) {}
        }
      }, []);

      useEffect(() => {
        rotateQuote();
      }, [currentDay]);

      const rotateQuote = () => {
        const randIdx = Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length);
        setRandomQuote(MOTIVATIONAL_QUOTES[randIdx]);
      };

      const handlePageChange = (newPage) => {
        setTransitionKey(prev => prev + 1);
        setAuthError('');
        setCurrentPage(newPage);
      };

      // Mouse-click burst emission
      const handleTriggerParticles = (e) => {
        const rect = e.target.getBoundingClientRect();
        const clientX = e.clientX || (rect.left + rect.width / 2);
        const clientY = e.clientY || (rect.top + rect.height / 2);

        const newParticles = Array.from({ length: 15 }).map((_, i) => ({
          id: Date.now() + i,
          x: clientX,
          y: clientY,
          dx: (Math.random() - 0.5) * 6,
          dy: (Math.random() - 0.5) * 6 - 2.5,
          size: Math.random() * 6 + 3,
          color: i % 2 === 0 ? '#d4af37' : '#c084fc'
        }));
        setParticles(prev => [...prev, ...newParticles]);
        setTimeout(() => {
          setParticles(prev => prev.filter(p => !newParticles.find(np => np.id === p.id)));
        }, 1200);
      };

      // Gravity updates on tracking particles
      useEffect(() => {
        if (particles.length === 0) return;
        const interval = setInterval(() => {
          setParticles(prev => prev.map(p => ({
            ...p,
            x: p.x + p.dx,
            y: p.y + p.dy,
            dy: p.dy + 0.1,
            size: Math.max(0, p.size - 0.14)
          })));
        }, 16);
        return () => clearInterval(interval);
      }, [particles]);

      // Handle custom user registration
      const handleRegisterSubmit = () => {
        const { fullName, username, password, confirmPassword } = authForm;
        if (!fullName.trim() || !username.trim() || !password.trim()) {
          setAuthError('All fields must be filled.');
          return;
        }
        if (password !== confirmPassword) {
          setAuthError('Passwords do not match.');
          return;
        }

        const newUserObj = { fullName, username, password };
        localStorage.setItem('chronos_user_reg', JSON.stringify(newUserObj));
        setRegisteredUser(newUserObj);
        setAuthForm({ fullName: '', username: '', password: '', confirmPassword: '' });
        setAuthMode('login');
        setAuthError('');
        alert("Chronicle successfully recorded! Please log in.");
      };

      // Handle user login matching localStorage
      const handleLoginSubmit = () => {
        const { username, password } = authForm;
        if (!username.trim() || !password.trim()) {
          setAuthError('Please fill in both fields.');
          return;
        }

        if (registeredUser && registeredUser.username === username.trim() && registeredUser.password === password.trim()) {
          setAuthError('');
          handlePageChange('course_selection');
        } else {
          setAuthError('Invalid username or passphrase.');
        }
      };

      // Dynamic Course Handlers
      const handleAddCourse = () => {
        if (!courseInput.name.trim()) return;
        const newCourse = {
          id: Date.now().toString(),
          name: courseInput.name.trim(),
          priority: courseInput.priority,
          creditHours: parseInt(courseInput.creditHours) || 3
        };
        setSelectedSubjects([...selectedSubjects, newCourse]);
        setCourseInput({ name: '', priority: 'High', creditHours: 3 });
      };

      const handleDeleteCourse = (id) => {
        setSelectedSubjects(selectedSubjects.filter(c => c.id !== id));
      };

      // Core AI Schedule Generation algorithm
      const runSchedulerAI = () => {
        if (selectedSubjects.length === 0) return;
        setIsGenerating(true);
        handlePageChange('scheduler_loading');

        setTimeout(() => {
          const calendar = [];
          const days = 7;
          
          // Generate realistic study sessions across 7 days
          for (let d = 1; d <= days; d++) {
            const dailyTasks = [];
            
            // Sort courses by priority weight
            const sortedCourses = [...selectedSubjects].sort((a, b) => {
              const weight = { 'High': 3, 'Medium': 2, 'Low': 1 };
              return weight[b.priority] - weight[a.priority];
            });
            
            // Select up to 3 courses for this day
            const selectedForToday = sortedCourses.slice(0, 3);
            
            selectedForToday.forEach((course, index) => {
              const duration = course.priority === 'High' ? 2 : 1;
              const tasksPool = [
                `Study core concepts of ${course.name}`,
                `Complete ${course.name} module exercises`,
                `Review lectures and summarize ${course.name} notes`,
                `Solve challenge problems for ${course.name}`,
                `Execute self-test review for ${course.name}`
              ];
              const taskDescription = tasksPool[(d + index) % tasksPool.length];
              
              dailyTasks.push({
                id: `task-${d}-${course.id}`,
                subject: course.name,
                time: `${9 + index * 3}:00 AM - ${9 + index * 3 + duration}:00 AM`,
                task: `${taskDescription} (${course.priority} Priority, ${course.creditHours} Credits)`,
                isBreak: false
              });
            });

            // Insert rest intervals
            if (dailyTasks.length > 1) {
              dailyTasks.splice(1, 0, {
                id: `break-${d}`,
                subject: "Temporal Rest Break",
                time: "11:00 AM - 11:30 AM",
                task: "Step away, stretch, and restore focus energies.",
                isBreak: true
              });
            }

            calendar.push({
              day: d,
              tasks: dailyTasks
            });
          }

          setWeeklySchedule(calendar);
          setCompletedTasks([]);
          setCurrentDay(1);
          setIsGenerating(false);
          handlePageChange('dashboard');
        }, 2200);
      };

      // Toggle checkbox and handle day completion
      const handleToggleTask = (taskId, e) => {
        let updated = [];
        if (completedTasks.includes(taskId)) {
          updated = completedTasks.filter(id => id !== taskId);
        } else {
          updated = [...completedTasks, taskId];
          playChimeSound();
          handleTriggerParticles(e);
        }
        setCompletedTasks(updated);
      };

      // Fetch today's generated items
      const todayScheduleObj = weeklySchedule.find(d => d.day === currentDay);
      const todayTasks = todayScheduleObj ? todayScheduleObj.tasks : [];
      const requiredTasksToday = todayTasks.filter(item => !item.isBreak);
      const allTodayTasksDone = requiredTasksToday.length > 0 && requiredTasksToday.every(t => completedTasks.includes(t.id));

      const handleCompleteDayClick = () => {
        playCongratulationsFanfare();
        handlePageChange('congratulations');
      };

      const handleProceedToNextDay = () => {
        if (currentDay < 7) {
          setCurrentDay(prev => prev + 1);
          setCompletedTasks([]);
          handlePageChange('dashboard');
        } else {
          alert("Excellent study cycle! You have fully completed the weekly schedule.");
          handlePageChange('course_selection');
        }
      };

      return (
        <div className="min-h-screen text-slate-100 flex flex-col justify-between select-none">
          
          {/* Header */}
          {currentPage !== 'welcome' && currentPage !== 'scheduler_loading' && (
            <header className="sticky top-0 z-40 bg-[#03050a]/90 backdrop-blur-md border-b border-amber-500/20 px-4 py-3 md:px-8 flex justify-between items-center transition-all">
              <div className="flex items-center space-x-3 cursor-pointer" onClick={() => handlePageChange('dashboard')}>
                <span className="text-amber-400 text-2xl font-cinzel-dec">⏳</span>
                <div>
                  <h1 className="font-cinzel font-bold text-md md:text-lg tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500">
                    CHRONOS ACADEMY
                  </h1>
                  <p className="text-[9px] uppercase font-cinzel tracking-widest text-slate-400">The Scholar's Odyssey</p>
                </div>
              </div>

              <div className="flex items-center space-x-4">
                {currentPage === 'dashboard' && (
                  <span className="hidden md:inline-block text-xs uppercase font-cinzel tracking-wider text-amber-400 bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">
                    Day {currentDay} of 7
                  </span>
                )}
                <button 
                  onClick={() => {
                    setCompletedTasks([]);
                    setCurrentDay(1);
                    handlePageChange('welcome');
                  }}
                  className="text-[10px] font-cinzel tracking-widest border border-red-500/30 hover:bg-red-950/20 text-red-400 px-3 py-1.5 rounded uppercase transition-all"
                >
                  Logout
                </button>
              </div>
            </header>
          )}

          {/* Core Content Navigation */}
          <main className="max-w-6xl mx-auto px-4 py-8 relative z-10 flex-grow w-full flex flex-col justify-center">
            
            {/* 1. WELCOME SCREEN */}
            {currentPage === 'welcome' && (
              <div key={`welcome-${transitionKey}`} className="animate-page-entry text-center py-8 flex flex-col items-center">
                <div className="mb-6 flex flex-col items-center">
                  
                  {/* Swords Logo - Uses React state to reliably fallback from 789.jpg to input_file_2.jpeg */}
                  <img 
                    src={logoImgSrc} 
                    onError={() => {
                      if (logoImgSrc === "789.jpg") {
                        setLogoImgSrc("input_file_2.jpeg");
                      }
                    }}
                    alt="Crossed Swords Logo" 
                    className="w-36 h-36 md:w-44 md:h-44 object-cover rounded-2xl border border-amber-500/30 shadow-[0_0_25px_rgba(212,175,55,0.25)] animate-float mb-6" 
                  />
                  
                  <h1 className="font-cinzel-dec text-2xl md:text-4xl text-transparent bg-clip-text bg-gradient-to-r from-amber-100 via-amber-300 to-amber-500 font-bold tracking-wider">
                    Welcome to Chronos Academy
                  </h1>
                  <p className="text-slate-300 font-lora text-xs md:text-sm mt-3 italic max-w-xl">
                    "Step through the iron gates where standard schedules are forged into legendary paths of learning."
                  </p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-10 items-center max-w-3xl glass-panel p-8 rounded-2xl glow-gold-card">
                  <div className="flex justify-center">
                    {/* Sentinel Soldier - Uses React state to reliably fallback from 123.jpg to input_file_0.jpeg */}
                    <img 
                      src={guardianImgSrc} 
                      onError={() => {
                        if (guardianImgSrc === "123.jpg") {
                          setSentinelImgSrc("input_file_0.jpeg");
                        }
                      }}
                      alt="Academy Guardian" 
                      className="w-full max-h-90 object-cover rounded-xl border border-amber-500/20 shadow-2xl shadow-purple-950/20" 
                    />
                  </div>
                  <div className="text-left space-y-4">
                    <h3 className="font-cinzel text-xl text-amber-300 font-bold uppercase tracking-wider font-semibold">The Sentinel's Challenge</h3>
                    <p className="text-xs text-slate-300 leading-relaxed font-jakarta">
                      Scholars who enter these halls are tasked with absolute mastery of their daily study targets. Forge your curriculum, balance your temporal budget, and conquer your goals to achieve true academic ascension.
                    </p>
                    <button 
                      onClick={() => {
                        if (registeredUser) {
                          handlePageChange('login');
                        } else {
                          handlePageChange('register');
                        }
                      }}
                      className="w-full py-4 bg-gradient-to-r from-amber-600 via-amber-500 to-amber-600 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-cinzel font-bold tracking-widest text-sm uppercase rounded-lg transition duration-300 shadow-xl shadow-amber-900/10 active:scale-95"
                    >
                      Get Started ✦
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* REGISTER SCREEN */}
            {currentPage === 'register' && (
              <div key={`register-${transitionKey}`} className="max-w-md mx-auto w-full glass-panel p-8 rounded-2xl shadow-2xl relative animate-page-entry glow-gold-card">
                <div className="text-center mb-6">
                  <span className="text-4xl">📜</span>
                  <h2 className="font-cinzel text-2xl text-amber-300 uppercase tracking-widest mt-2">Chronos Gate</h2>
                  <p className="text-slate-400 text-xs italic mt-1 font-lora">Create your custom academic registry record.</p>
                </div>

                {authError && (
                  <div className="mb-4 text-xs bg-red-955/30 border border-red-500/25 p-3 rounded-lg text-red-400 font-medium">
                    {authError}
                  </div>
                )}

                <div className="space-y-4">
                  <div>
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Full Name</label>
                    <input 
                      type="text" placeholder="e.g. Nicholas Vane"
                      value={authForm.fullName}
                      onChange={(e) => setAuthForm({ ...authForm, fullName: e.target.value })}
                      className="w-full glass-input text-xs text-slate-200 rounded-lg px-4 py-3"
                    />
                  </div>

                  <div>
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Scholar Username</label>
                    <input 
                      type="text" placeholder="e.g. nicholas_vane"
                      value={authForm.username}
                      onChange={(e) => setAuthForm({ ...authForm, username: e.target.value })}
                      className="w-full glass-input text-xs text-slate-200 rounded-lg px-4 py-3"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Password</label>
                      <input 
                        type="password" placeholder="••••••••"
                        value={authForm.password}
                        onChange={(e) => setAuthForm({ ...authForm, password: e.target.value })}
                        className="w-full glass-input text-xs text-slate-200 rounded-lg px-4 py-3"
                      />
                    </div>
                    <div>
                      <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Confirm Password</label>
                      <input 
                        type="password" placeholder="••••••••"
                        value={authForm.confirmPassword}
                        onChange={(e) => setAuthForm({ ...authForm, confirmPassword: e.target.value })}
                        className="w-full glass-input text-xs text-slate-200 rounded-lg px-4 py-3"
                      />
                    </div>
                  </div>

                  <button 
                    type="button"
                    onClick={handleRegisterSubmit}
                    className="w-full py-3.5 bg-gradient-to-r from-purple-800 to-purple-600 hover:from-purple-700 hover:to-purple-500 text-slate-100 font-cinzel font-semibold tracking-widest text-xs uppercase rounded-lg transition duration-300 shadow-lg"
                  >
                    Register Account ✦
                  </button>

                  <div className="text-center pt-2">
                    <button 
                      type="button"
                      onClick={() => handlePageChange('login')}
                      className="text-xs text-amber-400/80 hover:text-amber-400 font-medium transition"
                    >
                      Already registered? Log in here
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* LOGIN SCREEN */}
            {currentPage === 'login' && (
              <div key={`login-${transitionKey}`} className="max-w-md mx-auto w-full glass-panel p-8 rounded-2xl shadow-2xl relative animate-page-entry glow-gold-card">
                <div className="text-center mb-6">
                  <span className="text-4xl">🔑</span>
                  <h2 className="font-cinzel text-2xl text-amber-300 uppercase tracking-widest mt-2">Chronos Sign In</h2>
                  <p className="text-slate-400 text-xs italic mt-1 font-lora">Log in with your registered credentials.</p>
                </div>

                {authError && (
                  <div className="mb-4 text-xs bg-red-955/30 border border-red-500/25 p-3 rounded-lg text-red-400 font-medium">
                    {authError}
                  </div>
                )}

                <div className="space-y-4">
                  <div>
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Scholar Username</label>
                    <input 
                      type="text" placeholder="e.g. nicholas_vane"
                      value={authForm.username}
                      onChange={(e) => setAuthForm({ ...authForm, username: e.target.value })}
                      className="w-full glass-input text-xs text-slate-200 rounded-lg px-4 py-3"
                    />
                  </div>

                  <div>
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Passphrase</label>
                    <input 
                      type="password" placeholder="••••••••"
                      value={authForm.password}
                      onChange={(e) => setAuthForm({ ...authForm, password: e.target.value })}
                      className="w-full glass-input text-xs text-slate-200 rounded-lg px-4 py-3"
                    />
                  </div>

                  <button 
                    type="button"
                    onClick={handleLoginSubmit}
                    className="w-full py-3.5 bg-gradient-to-r from-amber-600 via-amber-500 to-amber-600 hover:from-amber-500 text-slate-950 font-cinzel font-semibold tracking-widest text-xs uppercase rounded-lg transition duration-300 shadow-lg"
                  >
                    Unlock Registry ✦
                  </button>

                  <div className="text-center pt-2">
                    <button 
                      type="button"
                      onClick={() => handlePageChange('register')}
                      className="text-xs text-amber-400/80 hover:text-amber-400 font-medium transition"
                    >
                      Need an account? Register here
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 3. DYNAMIC COURSE SELECTION (REPLACED SPECIFIC SELECTION) */}
            {currentPage === 'course_selection' && (
              <div key={`courses-${transitionKey}`} className="max-w-3xl mx-auto w-full glass-panel p-8 rounded-2xl shadow-2xl animate-page-entry glow-gold-card">
                <div className="text-center mb-6">
                  <span className="text-4xl">📚</span>
                  <h2 className="font-cinzel text-2xl text-amber-300 uppercase tracking-widest mt-2">Dynamic Course Management</h2>
                  <p className="text-slate-400 text-xs italic mt-1 font-lora">
                    Add unlimited courses, priorities and credit hours to establish your syllabus.
                  </p>
                </div>

                {/* Course Input Matrix Form */}
                <div className="grid grid-cols-1 md:grid-cols-12 gap-3 bg-slate-950/40 p-4 rounded-xl border border-white/5 mb-6">
                  <div className="md:col-span-5">
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Course Name</label>
                    <input 
                      type="text" placeholder="e.g. Data Structures"
                      value={courseInput.name}
                      onChange={(e) => setCourseInput({ ...courseInput, name: e.target.value })}
                      className="w-full bg-[#05080e] border border-slate-800 text-xs text-slate-200 rounded-lg px-3 py-2"
                    />
                  </div>

                  <div className="md:col-span-3">
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Priority</label>
                    <select 
                      value={courseInput.priority}
                      onChange={(e) => setCourseInput({ ...courseInput, priority: e.target.value })}
                      className="w-full bg-[#05080e] border border-slate-800 text-xs text-slate-200 rounded-lg px-2 py-2"
                    >
                      <option value="High">High</option>
                      <option value="Medium">Medium</option>
                      <option value="Low">Low</option>
                    </select>
                  </div>

                  <div className="md:col-span-2">
                    <label className="block text-[9px] uppercase font-cinzel text-amber-400 tracking-widest mb-1.5">Credits</label>
                    <input 
                      type="number" min="1" max="10"
                      value={courseInput.creditHours}
                      onChange={(e) => setCourseInput({ ...courseInput, creditHours: parseInt(e.target.value) || 3 })}
                      className="w-full bg-[#05080e] border border-slate-800 text-xs text-slate-200 rounded-lg px-2 py-1.5"
                    />
                  </div>

                  <div className="md:col-span-2 flex items-end">
                    <button 
                      type="button"
                      onClick={handleAddCourse}
                      className="w-full py-2 bg-purple-800 hover:bg-purple-700 text-slate-100 font-cinzel text-xs uppercase tracking-wider rounded-lg transition"
                    >
                      Add +
                    </button>
                  </div>
                </div>

                {/* Course List Display */}
                <div className="mb-6">
                  <h4 className="text-xs font-cinzel uppercase text-amber-400 tracking-wider mb-2">Selected Course Roster</h4>
                  {selectedSubjects.length === 0 ? (
                    <div className="text-center py-6 text-xs text-slate-500 italic bg-[#03050a]/40 rounded-xl border border-dashed border-slate-800">
                      No courses added yet. Please use the form above to populate your roster.
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-48 overflow-y-auto pr-2">
                      {selectedSubjects.map((sub) => (
                        <div key={sub.id} className="p-3 bg-slate-950/60 border border-slate-850 rounded-xl flex items-center justify-between text-xs hover:border-amber-500/30 transition">
                          <div>
                            <div className="font-semibold text-slate-200">{sub.name}</div>
                            <div className="text-[10px] text-slate-400 mt-0.5">
                              Priority: <span className="text-amber-400 font-medium">{sub.priority}</span> | Credits: {sub.creditHours}
                            </div>
                          </div>
                          <button 
                            onClick={() => handleDeleteCourse(sub.id)} 
                            className="text-red-400 hover:text-red-300 text-[10px] font-cinzel uppercase"
                          >
                            Remove
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* Weekly study capacity questionnaire */}
                <div className="bg-slate-950/40 p-4 rounded-xl border border-white/5 mb-6 space-y-3">
                  <label className="block text-xs uppercase font-cinzel text-amber-400 tracking-wider text-center">
                    How many total hours can you dedicate each week?
                  </label>
                  
                  <div className="flex justify-center space-x-3 mb-2">
                    {[15, 20, 30, 40].map((hours) => (
                      <button
                        key={hours}
                        type="button"
                        onClick={() => setWeeklyCapacity(hours)}
                        className={`px-4 py-1.5 rounded-full text-xs font-cinzel transition-all ${
                          weeklyCapacity === hours 
                            ? 'bg-amber-500 text-slate-950 font-bold shadow-[0_0_10px_rgba(212,175,55,0.3)]' 
                            : 'bg-slate-900 border border-slate-800 text-slate-400'
                        }`}
                      >
                        {hours} Hrs
                      </button>
                    ))}
                  </div>

                  <div className="flex items-center justify-center space-x-2">
                    <span className="text-xs text-slate-400">Custom capacity:</span>
                    <input 
                      type="number" min="5" max="80"
                      value={weeklyCapacity}
                      onChange={(e) => setWeeklyCapacity(parseInt(e.target.value) || 15)}
                      className="w-20 text-center bg-[#05080e] border border-slate-800 text-xs text-slate-200 rounded px-2 py-1"
                    />
                  </div>
                </div>

                <button 
                  onClick={runSchedulerAI}
                  disabled={selectedSubjects.length === 0}
                  className={`w-full py-4 rounded-lg font-cinzel font-bold tracking-widest text-xs uppercase transition-all duration-300 ${
                    selectedSubjects.length > 0 
                      ? 'bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 shadow-xl' 
                      : 'bg-slate-800 text-slate-500 cursor-not-allowed'
                  }`}
                >
                  Generate AI Study Schedule ✦
                </button>
              </div>
            )}

            {/* 4. AI STUDY SCHEDULE LOADING */}
            {currentPage === 'scheduler_loading' && (
              <div className="text-center space-y-6 max-w-md mx-auto py-16 animate-page-entry">
                <div className="w-20 h-20 rounded-full border-4 border-amber-400 border-t-transparent animate-spin mx-auto"></div>
                <h3 className="font-cinzel text-xl text-amber-300 tracking-wider uppercase animate-pulse">Calculating Temporal Frequencies...</h3>
                <p className="text-xs text-slate-400 font-lora leading-relaxed max-w-xs mx-auto">
                  "Our artificial timeline algorithms are balancing your priorities to forge the ideal daily roadmap."
                </p>
              </div>
            )}

            {/* 5, 6. DAILY STUDY PLANNER & INTERACTIVE TO-DO LIST */}
            {currentPage === 'dashboard' && (
              <div key={`dashboard-${transitionKey}`} className="space-y-8 animate-page-entry">
                
                {/* Upper banner displaying active quote and general timeline information */}
                <div className="glass-panel p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 glow-purple-card font-jakarta">
                  <div className="text-left space-y-1">
                    <span className="text-[10px] font-cinzel font-bold tracking-widest text-purple-400 uppercase">Daily Directive</span>
                    <h3 className="font-cinzel text-lg text-amber-300 font-bold uppercase tracking-wider">Day {currentDay} Checklist</h3>
                    <p className="text-xs text-slate-300 font-lora italic">
                      "{randomQuote}"
                    </p>
                  </div>
                  
                  {/* Dynamic Progress indicator card */}
                  <div className="flex items-center space-x-4 shrink-0 bg-slate-950/40 p-3 rounded-xl border border-white/5">
                    <div className="text-right">
                      <span className="block text-[9px] uppercase font-cinzel text-slate-400">Completion Ratios</span>
                      <strong className="text-amber-400 font-cinzel text-lg">
                        {completedTasks.length} / {requiredTasksToday.length}
                      </strong>
                    </div>
                    
                    {/* Progress Fill bar */}
                    <div className="w-24 bg-slate-950 h-2 rounded-full overflow-hidden border border-slate-800">
                      <div 
                        className="bg-gradient-to-r from-purple-500 to-amber-400 h-full transition-all duration-500"
                        style={{ width: `${(completedTasks.length / Math.max(1, requiredTasksToday.length)) * 100}%` }}
                      ></div>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 font-jakarta">
                  
                  {/* Left Column: AI Daily Schedule Timeline view */}
                  <div className="lg:col-span-7 space-y-4">
                    <h3 className="font-cinzel text-xs text-amber-300 tracking-widest uppercase">Timetable Manifesto</h3>
                    
                    <div className="space-y-3">
                      {todayTasks.map((item) => (
                        <div 
                          key={item.id} 
                          className={`p-4 border rounded-xl glass-panel relative transition duration-300 ${
                            item.isBreak 
                              ? 'border-purple-500/20 bg-purple-950/10' 
                              : 'border-slate-800 hover:border-amber-500/20'
                          }`}
                        >
                          <div className="flex justify-between items-start mb-1">
                            <span className="text-xs font-bold font-cinzel text-amber-400 uppercase tracking-wider">{item.subject}</span>
                            <span className="text-[10px] font-mono text-slate-400">{item.time}</span>
                          </div>
                          <p className="text-xs text-slate-300 font-jakarta">{item.task}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Right Column: Interactive Checklist view */}
                  <div className="lg:col-span-5 space-y-4">
                    <h3 className="font-cinzel text-xs text-amber-300 tracking-widest uppercase">Day {currentDay} Study Tasks</h3>
                    
                    <div className="space-y-3">
                      {requiredTasksToday.map((item) => {
                        const isDone = completedTasks.includes(item.id);
                        return (
                          <div 
                            key={item.id}
                            onClick={(e) => handleToggleTask(item.id, e)}
                            className={`p-4 border rounded-xl cursor-pointer checkbox-pop transition-all duration-300 flex items-center justify-between ${
                              isDone 
                                ? 'bg-emerald-950/25 border-emerald-500/40 shadow-[0_0_15px_rgba(16,185,129,0.15)]' 
                                : 'bg-[#05080e] border-slate-850 hover:border-amber-400/40 hover:scale-[1.02]'
                            }`}
                          >
                            <div className="flex items-center space-x-3">
                              <div className={`w-5.5 h-5.5 rounded-lg border flex items-center justify-center transition-all duration-300 ${
                                isDone ? 'border-emerald-400 bg-emerald-500 text-slate-950 font-bold' : 'border-slate-700 bg-slate-950'
                              }`}>
                                {isDone && "✓"}
                              </div>
                              <span className={`text-xs font-medium ${isDone ? 'line-through text-slate-500' : 'text-slate-200'}`}>
                                {item.subject} Study block
                              </span>
                            </div>
                            <span className="text-[9px] uppercase font-cinzel tracking-widest text-slate-500 group-hover:text-amber-400 transition">
                              {isDone ? 'Resolved' : 'Verify'}
                            </span>
                          </div>
                        );
                      })}
                    </div>

                    {/* Complete Day trigger button */}
                    {allTodayTasksDone && (
                      <div className="pt-4 animate-page-entry">
                        <button
                          onClick={handleCompleteDayClick}
                          className="w-full py-4 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-slate-950 font-cinzel font-bold tracking-widest text-xs uppercase rounded-lg transition duration-300 shadow-xl"
                        >
                          Complete Day {currentDay} ✦
                        </button>
                      </div>
                    )}
                  </div>

                </div>

              </div>
            )}

            {/* 7. CONGRATULATIONS CELEBRATION PAGE (UNCHANGED INTERFACE WITH ADDED START DAY 2 BUTTON) */}
            {currentPage === 'congratulations' && (
              <div key={`congrats-${transitionKey}`} className="animate-page-entry text-center max-w-3xl mx-auto py-8 space-y-8 flex flex-col items-center">
                
                {/* Grand celebration circle */}
                <div className="relative w-48 h-48 flex items-center justify-center">
                  <div className="absolute inset-0 border border-double border-amber-400/30 rounded-full animate-spin-astrolabe"></div>
                  <div className="absolute w-36 h-36 border border-dashed border-purple-500/40 rounded-full flex items-center justify-center">
                    <span className="text-6xl">🏆</span>
                  </div>
                </div>

                <div className="space-y-3 font-cinzel">
                  <h1 className="font-cinzel-dec text-3xl md:text-5xl text-amber-400 font-bold tracking-wider">
                    Congratulations!
                  </h1>
                  <h2 className="font-cinzel text-lg md:text-xl text-slate-200 uppercase tracking-widest">
                    You have successfully completed today's study plan!
                  </h2>
                </div>

                {/* Anime Warrior mascot delivering Speech bubble dialog box */}
                <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-center p-6 glass-panel rounded-2xl glow-gold-card w-full text-left font-jakarta">
                  <div className="md:col-span-4 flex justify-center">
                    {/* Uses state-driven React fallback to transition from 111.jpg to 456.jpg to input_file_1.jpeg during typing renders */}
                    <img 
                      src={mascotImgSrc} 
                      onError={() => {
                        if (mascotImgSrc === "111.jpg") {
                          setMascotImgSrc("456.jpg");
                        } else if (mascotImgSrc === "456.jpg") {
                          setMascotImgSrc("input_file_1.jpeg");
                        }
                      }}
                      alt="Academy Hero" 
                      className="w-full h-auto rounded-xl border border-purple-500/20 shadow-2xl object-cover max-h-64" 
                    />
                  </div>
                  
                  <div className="md:col-span-8 space-y-4">
                    {/* Game-style dialogue box */}
                    <div className="bg-[#03050a]/80 p-4 rounded-xl border border-purple-500/25 min-h-[80px]">
                      <span className="block text-[10px] font-cinzel tracking-widest text-purple-400 font-bold uppercase mb-1">Scholar Guardian Vane</span>
                      <Typewriter text={CONGRATS_MESSAGES[currentDay % CONGRATS_MESSAGES.length]} delay={25} />
                    </div>

                    <button 
                      onClick={handleProceedToNextDay}
                      className="w-full py-3 bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-cinzel font-bold tracking-widest text-xs uppercase rounded-lg transition duration-200"
                    >
                      {currentDay < 7 ? `Start Day ${currentDay + 1} ✦` : "Complete Weekly Tapestry ✦"}
                    </button>
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* Mouse-Click Particles layer */}
          <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
            {particles.map((p) => (
              <div 
                key={p.id}
                style={{
                  position: 'absolute',
                  left: `${p.x}px`,
                  top: `${p.y}px`,
                  width: `${p.size}px`,
                  height: `${p.size}px`,
                  borderRadius: '50%',
                  backgroundColor: p.color,
                  boxShadow: `0 0 10px ${p.color}`,
                  transform: 'translate(-50%, -50%)',
                  transition: 'opacity 1s ease-out'
                }}
              />
            ))}
          </div>

          <footer className="py-6 border-t border-slate-950 text-center text-[9px] uppercase font-cinzel tracking-widest text-slate-500 relative z-20">
            Chronos Academy Study Odyssey © 2026. Keep the Sands Flowing.
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChronosAcademy />);
  </script>
</body>
</html>
